services:
  # Laravel API Service
  - type: web
    name: epf-marketplace-api
    env: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan key:generate && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://epf-marketplace-api.onrender.com
      - key: LOG_CHANNEL
        value: errorlog
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: tidb-cloud
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tidb-cloud
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: tidb-cloud
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: tidb-cloud
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tidb-cloud
          property: password
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SANCTUM_STATEFUL_DOMAINS
        value: epf-marketplace-api.onrender.com
      - key: SESSION_DOMAIN
        value: .epf-marketplace-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://epf-marketplace-frontend.vercel.app

databases:
  # TiDB Cloud Database
  - name: tidb-cloud
    databaseName: epf_marketplace
    user: epf_marketplace_user
    plan: free
